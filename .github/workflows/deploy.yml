name: Deploy Brand Guardian to Azure

# Triggers: push to main branch
on:
  push:
    branches: [main]

env:
  ACR_NAME: brandguardianacr2026
  IMAGE_NAME: brand-guardian
  RESOURCE_GROUP: brand-project
  APP_NAME: brand-guardian-app

jobs:
  # ===== JOB 1: Build & Push Docker Image to ACR =====
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Build & Push Docker image
        run: |
          docker build -t ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }} .
          docker build -t ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:latest .
          docker push ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:latest

  # ===== JOB 2: Deploy to Azure App Service =====
  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to App Service
        run: |
          az webapp config container set \
            --name ${{ env.APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --container-image-name ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            --container-registry-url https://${{ env.ACR_NAME }}.azurecr.io

      - name: Restart App Service
        run: az webapp restart --name ${{ env.APP_NAME }} --resource-group ${{ env.RESOURCE_GROUP }}

      - name: Wait & Health Check
        run: |
          echo "Waiting 30s for app to start..."
          sleep 30
          curl -f https://${{ env.APP_NAME }}.azurewebsites.net/health || echo "Health check pending..."
